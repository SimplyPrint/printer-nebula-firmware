name: Check and Download Firmware Updates

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: 3.12

      - name: Check firmware version
        id: check_version
        run: |
          uv sync
          output=$(uv run get-version.py)
          VERSION=$(echo "$output" | sed -n '1p')
          URL=$(echo "$output" | sed -n '2p')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          
          echo "Found version: $VERSION"
          echo "With url: $URL"

      - name: Get SP version
        id: sp_version
        run: |
          SP_VERSION=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)
          echo "version=$SP_VERSION" >> $GITHUB_OUTPUT
          echo "SP version: $SP_VERSION"

      - name: Check if release exists
        id: check_release
        run: |
          TAG="SP_v${{ steps.sp_version.outputs.version }}_V${{ steps.check_version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and create release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          # Download dependencies
          sudo apt-get update
          sudo apt-get install openssl p7zip squashfs-tools wget whois
          
          # Download firmware
          chmod +x create.sh
          ./create.sh
          
          # Create release
          SP_VERSION="${{ steps.sp_version.outputs.version }}"
          CREALITY_VERSION="${{ steps.check_version.outputs.version }}"
          FIRMWARE_FILE="SP_v${SP_VERSION}_NEBULA_ota_img_V6.${CREALITY_VERSION}.img"
          TAG="SP_v${SP_VERSION}_V${CREALITY_VERSION}"
          gh release create "$TAG" \
            --title "SP v${SP_VERSION} - Firmware V${CREALITY_VERSION}" \
            --notes "Firmware version ${CREALITY_VERSION}" \
            "$FIRMWARE_FILE"
        env:
          CREALITY_VERSION: ${{ steps.check_version.outputs.version }}
          DOWNLOAD_URL: ${{ steps.check_version.outputs.url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}